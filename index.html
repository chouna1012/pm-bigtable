/* ============ IMPORT (Notion CSV / JSON backup) ============ */
function openImport(){
  const M=document.getElementById('modal');
  M.innerHTML=`<div class="modal"><h3>⬆ 匯入案件</h3>
    <div class="desc">支援兩種來源：Notion 案件資料庫匯出的 CSV，或本工具的 JSON 備份。</div>
    <div class="field"><label>① Notion CSV（建議：從「工程」視圖匯出）</label>
      <input type="file" id="imp-csv" accept=".csv"></div>
    <div class="card" style="font-size:.72rem;color:var(--muted);line-height:1.7">
      <b style="color:var(--text)">Notion 匯出步驟：</b><br>
      1. 開啟 Notion 案件資料庫的「工程」視圖（已自動篩選 狀態=工程中）<br>
      2. 右上 ··· → 匯出 → 格式選 <b>Markdown &amp; CSV</b> → 匯出<br>
      3. 把解壓出的 .csv 檔上傳到上方<br>
      <span style="color:var(--amber)">會自動對應：名稱→專案、工程簽約金額→預算、開案日→開始日、預計完工日→期望完成日、協助者/設計師→團隊</span>
    </div>
    <div class="field" style="margin-top:14px"><label>② 或還原 JSON 備份</label>
      <input type="file" id="imp-json" accept=".json"></div>
    <div class="modal-actions">
      <button class="btn sec" onclick="closeModal()">取消</button>
      <button class="btn" onclick="runImport()">開始匯入</button>
    </div></div>`;
  M.classList.add('open');
}

function runImport(){
  const csvF=document.getElementById('imp-csv').files[0];
  const jsonF=document.getElementById('imp-json').files[0];
  if(jsonF){
    const r=new FileReader();
    r.onload=e=>{try{const d=JSON.parse(e.target.result);
      if(d.members&&d.projects){if(confirm('還原備份會覆蓋目前所有資料，確定？')){db=d;save();closeModal();switchView('dashboard');}}
      else alert('JSON 格式不符');}catch(err){alert('讀取失敗：'+err.message);}};
    r.readAsText(jsonF);return;
  }
  if(csvF){
    const r=new FileReader();
    r.onload=e=>importNotionCSV(e.target.result);
    r.readAsText(csvF);return;
  }
  alert('請先選擇一個檔案');
}

function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(c==='\r'){}else cur+=c;}}
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(c=>c.trim()));
}

function ensureMemberByName(name,role){
  name=(name||'').replace(/\s*\(https?:\/\/[^)]*\)/g,'').trim();if(!name)return null;
  let m=db.members.find(x=>x.name===name);
  if(!m){m={id:uid('m'),name,role:role||'成員',rate:0,capacity:8,leave:[],
    icon:ICONS[db.members.length%ICONS.length],color:COLORS[db.members.length%COLORS.length]};
    db.members.push(m);}
  return m;
}

function importNotionCSV(text){
  const rows=parseCSV(text);
  if(rows.length<2){alert('CSV 沒有資料');return;}
  const headers=rows[0].map(h=>h.trim());
  const idx=n=>headers.findIndex(h=>h===n||h.replace(/\s/g,'')===n);
  const iName=idx('名稱'), iStatus=idx('狀態'),
        iBudget=headers.findIndex(h=>h.includes('工程簽約金額')),
        iStart=headers.findIndex(h=>h.includes('開案日')),
        iDue=headers.findIndex(h=>h.includes('預計完工日')),
        iAssist=headers.findIndex(h=>h.includes('協助者')&&!h.includes('過去')),
        iDesigner=headers.findIndex(h=>h.includes('設計師')),
        iLoc=headers.findIndex(h=>h.includes('案件地點'));
  if(iName<0){alert('找不到「名稱」欄位，請確認是案件資料庫的 CSV');return;}

  let added=0,skipped=0;
  // Notion 狀態 → 本工具狀態
  const mapStatus=s=>{ if(s.includes('工程中'))return 'engineering'; if(s.includes('客變'))return 'change';
    if(s.includes('設計中'))return 'design'; if(s.includes('洽談'))return 'talk'; if(s.includes('未開始'))return 'pending';
    if(s.includes('結案')||s.includes('完成'))return 'done'; return 'design'; };
  // 清掉名稱裡的 Notion 連結後綴： "雅萍 (https://...)" → "雅萍"
  const cleanName=x=>(x||'').replace(/\s*\(https?:\/\/[^)]*\)/g,'').trim();
  rows.slice(1).forEach(r=>{
    const name=(r[iName]||'').trim();if(!name)return;
    const rawStatus=iStatus>=0?(r[iStatus]||'').trim():'';
    // 只匯入進行中：洽談 / 未開始 / 設計中 / 工程中 / 客變完成
    const keep=['洽談','未開始','設計中','工程中','客變完成'];
    if(iStatus>=0 && !keep.includes(rawStatus)){skipped++;return;}
    if(db.projects.some(p=>p.name===name)){skipped++;return;} // dedupe
    const status=mapStatus(rawStatus);
    const team=[];
    const addNames=(cell,role)=>{if(cell)cleanName(cell).split(/[,、；;]/).forEach(n=>{
      let nm=n.trim(); if(!nm)return;
      if(nm==='卓Una'||nm==='Una卓')nm='Una'; // 統一同一人
      const m=ensureMemberByName(nm,role);if(m&&!team.includes(m.id))team.push(m.id);});};
    if(iDesigner>=0)addNames(r[iDesigner],'設計師');
    if(iAssist>=0)addNames(r[iAssist],'助理');
    const budget=iBudget>=0?parseInt((r[iBudget]||'').replace(/[^\d]/g,''))||0:0;
    const start=iStart>=0?(r[iStart]||'').trim().replace(/\//g,'-').slice(0,10):'';
    const due=iDue>=0?(r[iDue]||'').trim().replace(/\//g,'-').slice(0,10):'';
    const dept=iLoc>=0?(r[iLoc]||'').trim():'';
    const partList=team.length?team:[];
    const tmpl=tasksForStatus(status);
    const perDur=Math.max(1,Math.round(45/tmpl.length));
    db.projects.push({
      id:uid('p'),name,dept,dueDate:due,budget,startDate:start||new Date().toISOString().slice(0,10),
      duration:45,managerId:team[0]||null,status,participants:[...team],issues:[],
      workPackages:[{id:uid('w'),name:status==='engineering'?'工程流程':'設計流程',tasks:tmpl.map((tn,i)=>({
        id:uid('t'),name:tn,assignees:partList.length?[{memberId:partList[i%partList.length],hours:8}]:[],
        fixedCost:0,fixedCostName:'',fixedCostActual:null,durPlan:perDur,durActual:0,startActualOffset:null,startOffset:i*perDur,pct:0,status:'todo'}))}]
    });
    added++;
  });
  save();closeModal();switchView('dashboard');
  setTimeout(()=>alert(`匯入完成！新增 ${added} 個進行中案件（設計中／工程中／客變）${skipped?`，略過 ${skipped} 筆（已結案、無緣或重複）`:''}。`),100);
}

function migrate(){
  let ch=false;
  if(!db.templates){db.templates={talk:[...DEFAULT_TEMPLATES.talk],design:[...DEFAULT_TEMPLATES.design],change:[...DEFAULT_TEMPLATES.change],engineering:[...DEFAULT_TEMPLATES.engineering]};ch=true;}
  if(!db.customStatus){db.customStatus={};ch=true;}
  if(!db.holidays){db.holidays=[...DEFAULT_HOLIDAYS_2026];ch=true;}
  if(!db.colPrefs){db.colPrefs={owner:true,start:true,hours:true,vcost:false,fcost:false,tcost:true,dur:true,pct:true};ch=true;}
  rebuildStatus();
  const projStatusMap={active:'design',todo:'talk',review:'design',hold:'talk'}; // 舊→新
  db.members.forEach(m=>{
    if(m.capacity==null){m.capacity=8;ch=true;}
    if(!Array.isArray(m.leave)){m.leave=[];ch=true;}
  });
  db.projects.forEach(p=>{
    if(projStatusMap[p.status]){p.status=projStatusMap[p.status];ch=true;}
    if(!STATUS[p.status]){p.status='design';ch=true;}
    projTasks(p).forEach(t=>{
      if(t.durActual==null){t.durActual=0;ch=true;}
      if(t.fixedCostActual===undefined){t.fixedCostActual=null;ch=true;}
      if(t.startActualOffset===undefined){t.startActualOffset=null;ch=true;}
      // 任務狀態：舊的 active/review/hold → doing
      if(['active','review','hold'].includes(t.status)){t.status='doing';ch=true;}
      if(!t.status||!TASK_STATUS[t.status]){t.status='todo';ch=true;}
      (t.assignees||[]).forEach(a=>{if(a.hoursActual===undefined){a.hoursActual=null;ch=true;}});
    });
  });
  if(ch)save();
}
window.onload=()=>{ injectNotionCases(); migrate(); detectBootDirty(); renderDashboard(); renderMembers(); initGoogle(); };
