<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Big Table｜專案管理大表</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --surface3:#2a2f47;
    --border:#2e3450; --accent:#4f8ef7; --accent2:#7c63f5;
    --gold:#f5c842; --green:#43d9a2; --red:#e05555; --amber:#f8a948;
    --text:#e8eaf6; --muted:#7b82a8;
    --font:'Noto Sans TC',sans-serif; --mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:80px}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--surface)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  /* HEADER */
  header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;
    align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:20}
  header h1{font-size:1.15rem;font-weight:900;letter-spacing:.03em}
  header h1 span{color:var(--accent)}
  .hdr-actions{display:flex;gap:8px}

  .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;
    font-size:.82rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s}
  .btn:hover{opacity:.88}
  .btn:active{transform:scale(.97)}
  .btn.sec{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
  .btn.danger{background:var(--red)}
  .btn.sm{padding:5px 11px;font-size:.72rem}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}

  /* TABS */
  .tabs{display:flex;gap:4px;padding:12px 20px 0;overflow-x:auto;border-bottom:1px solid var(--border)}
  .tab{padding:9px 16px;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;
    border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab:hover{color:var(--text)}

  .view{padding:20px;display:none}
  .view.active{display:block}

  /* SUMMARY CARDS */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
  .card .lbl{font-size:.64rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  .card .val{font-size:1.5rem;font-weight:900;font-family:var(--mono)}
  .card .sub{font-size:.68rem;color:var(--muted);margin-top:3px}

  /* PROJECT LIST */
  .proj-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:18px;margin-bottom:14px;cursor:pointer;transition:border-color .15s}
  .proj-card:hover{border-color:var(--accent)}
  .proj-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
  .proj-title{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .proj-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:.74rem;color:var(--muted);margin-bottom:12px}
  .proj-meta b{color:var(--text);font-weight:600}
  .proj-team{display:flex;gap:-6px;align-items:center}
  .proj-progress{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-top:6px}
  .proj-progress > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:4px;transition:width .4s}

  /* AVATAR */
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:.95rem;font-weight:700;color:#fff;flex-shrink:0;border:2px solid var(--bg)}
  .avatar.sm{width:24px;height:24px;font-size:.75rem;border-width:1.5px}
  .avatar.lg{width:46px;height:46px;font-size:1.3rem}
  .avatar-stack{display:flex}
  .avatar-stack .avatar{margin-left:-8px}
  .avatar-stack .avatar:first-child{margin-left:0}

  /* STATUS BADGE */
  .badge{font-size:.66rem;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
  .b-todo{background:#2e3450;color:var(--muted)}
  .b-active{background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent)}
  .b-review{background:color-mix(in srgb,var(--gold) 20%,transparent);color:var(--gold)}
  .b-done{background:color-mix(in srgb,var(--green) 20%,transparent);color:var(--green)}
  .b-hold{background:color-mix(in srgb,var(--amber) 20%,transparent);color:var(--amber)}
  .b-talk{background:color-mix(in srgb,var(--amber) 20%,transparent);color:var(--amber)}
  .b-design{background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent)}
  .b-engineering{background:color-mix(in srgb,var(--accent2) 22%,transparent);color:var(--accent2)}
  .b-change{background:color-mix(in srgb,var(--gold) 22%,transparent);color:var(--gold)}
  .b-pending{background:#2e3450;color:var(--muted)}
  .b-doing{background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent)}
  .mvbtn{background:var(--surface3);border:none;color:var(--text);border-radius:5px;width:24px;height:22px;font-size:.6rem;cursor:pointer;margin:1px;line-height:1}
  .mvbtn:disabled{opacity:.3;cursor:default}

  /* MEMBER POOL */
  .member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .member-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;
    display:flex;align-items:center;gap:12px}
  .member-card .info{flex:1;min-width:0}
  .member-card .nm{font-weight:700;font-size:.9rem}
  .member-card .rl{font-size:.72rem;color:var(--muted)}
  .member-card .rt{font-family:var(--mono);font-size:.82rem;font-weight:600}

  /* BIG TABLE */
  .bigtable-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)}
  table.bt{border-collapse:collapse;width:100%;min-width:880px;font-size:.78rem}
  table.bt th{background:var(--surface2);color:var(--muted);font-size:.66rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.05em;padding:10px 8px;text-align:center;
    border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:5}
  table.bt td{padding:9px 8px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);
    text-align:center;vertical-align:middle}
  table.bt tr:hover td{background:color-mix(in srgb,var(--accent) 4%,transparent)}
  .wp-row td{background:var(--surface2)!important;font-weight:700;text-align:left;font-size:.8rem;color:var(--accent)}
  .cost-cell{font-family:var(--mono);color:var(--gold)}
  .dur-cell{font-family:var(--mono);color:var(--green)}
  .pct-bar{width:60px;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin:0 auto}
  .pct-bar > div{height:100%;background:var(--green)}
  .task-name-cell{text-align:left;font-weight:500}
  /* 凍結欄：任務名稱~狀態都固定，只有時間軸橫向捲動。left 由 JS 內嵌設定 */
  table.bt th.fz, table.bt td.fz{position:sticky;z-index:3;background:var(--surface)}
  table.bt th.fz{z-index:7;background:var(--surface2)}
  table.bt .wp-row td{position:static}
  table.bt tr:hover td.fz{background:color-mix(in srgb,var(--accent) 6%,var(--surface))}
  .gantt-cell{padding:4px!important}
  .gantt-track{display:flex;gap:1px;min-width:140px}
  .gantt-day{flex:1;height:18px;border-radius:2px;background:var(--surface3);min-width:8px}
  /* 時間軸日期刻度尺 */
  .date-ruler{display:flex;gap:1px;min-width:140px}
  .date-tick{flex:1;min-width:8px;text-align:center;font-size:.54rem;color:var(--muted);border-left:1px solid transparent;position:relative}
  .date-tick.mark{border-left:1px solid var(--border);color:var(--accent)}
  .date-tick.today{color:var(--red);font-weight:700}
  .date-tick.tick-we{background:#23283d}
  .date-tick.tick-hol{background:#3a2030}
  .today-dot{display:block;width:6px;height:6px;border-radius:50%;background:var(--red);margin:1px auto 0}
  .ruler-row td{background:var(--surface2)!important;padding:3px 4px!important;border-bottom:2px solid var(--border)!important}

  /* ISSUE TABLE */
  .light{width:14px;height:14px;border-radius:50%;display:inline-block}
  .l-green{background:var(--green)}.l-amber{background:var(--amber)}.l-red{background:var(--red)}
  .l-loss{background:#e0598b}.l-other{background:#8893a8}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-start;
    justify-content:center;z-index:100;padding:30px 16px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:24px;width:520px;max-width:100%;margin:auto}
  .modal h3{font-size:1.1rem;font-weight:800;margin-bottom:6px}
  .modal .desc{font-size:.76rem;color:var(--muted);margin-bottom:18px}

  /* FORM */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);
    color:var(--text);border-radius:9px;padding:10px 12px;font-size:.88rem;font-family:var(--font);outline:none;transition:border .15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field-row{display:flex;gap:10px}
  .field-row .field{flex:1}

  /* WIZARD */
  .wiz-steps{display:flex;gap:6px;margin-bottom:20px}
  .wiz-step-dot{flex:1;height:5px;border-radius:3px;background:var(--surface3);transition:background .3s}
  .wiz-step-dot.done{background:var(--green)}
  .wiz-step-dot.cur{background:var(--accent)}
  .wiz-stepno{font-size:.7rem;color:var(--accent);font-weight:700;letter-spacing:.08em;margin-bottom:4px}
  .wiz-panel{display:none}
  .wiz-panel.active{display:block;animation:fade .3s}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* PERSON SELECT CHIPS */
  .person-pick{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:6px}
  .person-chip{display:flex;align-items:center;gap:9px;background:var(--surface2);border:2px solid var(--border);
    border-radius:10px;padding:9px 11px;cursor:pointer;transition:all .15s}
  .person-chip:hover{border-color:var(--muted)}
  .person-chip.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent)}
  .person-chip .nm{font-size:.82rem;font-weight:600}
  .person-chip .rl{font-size:.66rem;color:var(--muted)}
  .check{margin-left:auto;width:18px;height:18px;border-radius:50%;border:2px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
  .person-chip.sel .check{background:var(--accent);border-color:var(--accent);color:#fff}

  /* ICON PICKER */
  .icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:6px}
  .icon-opt{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:1.1rem;
    background:var(--surface2);border:2px solid var(--border);border-radius:8px;cursor:pointer}
  .icon-opt.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent)}
  .color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .color-opt{width:30px;height:30px;border-radius:8px;cursor:pointer;border:3px solid transparent}
  .color-opt.sel{border-color:#fff}

  .modal-actions{display:flex;gap:8px;justify-content:space-between;margin-top:20px}

  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .ico{font-size:2.5rem;margin-bottom:12px}

  .section-head{display:flex;justify-content:space-between;align-items:center;margin:22px 0 12px}
  .section-head h2{font-size:.95rem;font-weight:800}
  .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted);
    cursor:pointer;margin-bottom:14px;font-weight:600}
  .back-btn:hover{color:var(--text)}

  .plan-actual{display:flex;flex-direction:column;gap:2px;font-size:.7rem}
  .pa-plan{color:var(--muted)}
  .pa-actual{color:var(--text);font-weight:600}

  @media(max-width:640px){
    .field-row{flex-direction:column;gap:0}
    .icon-grid{grid-template-columns:repeat(6,1fr)}
  }
</style>
</head>
<body>

<header>
  <h1>PM <span>Big Table</span></h1>
  <div class="hdr-actions">
    <button class="btn sec sm" id="cloudBtn" onclick="cloudClick()">☁ 雲端登入</button>
    <button class="btn sec sm" onclick="openImport()">⬆ 匯入</button>
    <button class="btn sec sm" onclick="exportJSON()">⬇ 備份</button>
    <button class="btn sm" onclick="startWizard()">＋ 新專案</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-view="dashboard" onclick="switchView('dashboard')">📊 總覽</div>
  <div class="tab" data-view="workload" onclick="switchView('workload')">⚖ 負荷</div>
  <div class="tab" data-view="schedule" onclick="switchView('schedule')">📅 排程</div>
  <div class="tab" data-view="members" id="tab-members" onclick="switchView('members')">👥 人員</div>
</div>

<!-- DASHBOARD -->
<div class="view active" id="view-dashboard"></div>

<!-- PROJECT DETAIL -->
<div class="view" id="view-project"></div>

<!-- MEMBERS -->
<div class="view" id="view-members"></div>

<!-- WORKLOAD -->
<div class="view" id="view-workload"></div>

<!-- SCHEDULE -->
<div class="view" id="view-schedule"></div>

<!-- WIZARD MODAL -->
<div class="overlay" id="wizard"></div>
<!-- GENERIC MODAL -->
<div class="overlay" id="modal"></div>

<script>
/* ============ DATA LAYER ============ */
const ICONS = ['🦊','🐼','🐨','🦁','🐯','🐸','🐵','🦉','🐙','🦄','🐳','🦋','🐝','🦖','🐬','🦜','🐺','🦝','🐰','🐮','🦅','🦚','🐢','🦔'];
const COLORS = ['#4f8ef7','#7c63f5','#f06292','#f8a948','#43d9a2','#f5c842','#e05555','#00bcd4','#ab47bc','#26a69a'];
const DEFAULT_TEMPLATES = {
  talk: ['S01-1 加入LINE群組','S01-4 第一次面談','S01-5 意象探尋','客戶預約到店','報價討論'],
  design: ['S02-0 設計簽約','S02-1 平面圖定稿','S02-3 丈量','S02-4 SketchUp豆腐塊','S02-5 SketchUp素模','S02-6 材料模型','S02-7 平面系統圖','S02-9 選材料','S02-9-1 選設備','S02-10 立面系統圖','S02-11 選材呈現','S02-8 工程報價'],
  change: ['S02-2-1 客變圖說繪製','S02-2-2 陪同建商客變','S02-2-3 建商回饋圖說與報價核對','S02-2-4 完成等待交屋'],
  engineering: ['S03-1 工程進場前會議','S03-2 保護工程','S03-3 拆除工程','S03-4 泥作工程','S03-5 水電工程','S03-6 空調配管工程','S03-7 木作工程','S03-8 油漆工程','S03-14 玻璃工程','S03-15 清潔工程','S03-10 初次驗收','工程驗收結案']
};
const STAGE_LABELS = {talk:'洽談中',design:'設計中',change:'客變中',engineering:'工程中'};
const BUILTIN_STATUS = {pending:'未開始',talk:'洽談中',design:'設計中',change:'客變中',engineering:'工程中',done:'已完成'};
let STATUS = {...BUILTIN_STATUS};
const TASK_STATUS = {todo:'待開始',doing:'進行中',done:'已完成'};
// 合併內建＋自訂狀態（done 永遠排最後）
function rebuildStatus(){
  const custom=(db&&db.customStatus)||{};
  const merged={};
  Object.entries(BUILTIN_STATUS).forEach(([k,v])=>{ if(k!=='done')merged[k]=v; });
  Object.entries(custom).forEach(([k,v])=>{ merged[k]=v; });
  merged.done=BUILTIN_STATUS.done;
  STATUS=merged;
  // 為自訂狀態動態加上 badge 顏色
  let st=document.getElementById('customStatusCSS');
  if(!st){st=document.createElement('style');st.id='customStatusCSS';document.head.appendChild(st);}
  const palette=['#5b8def','#9b6cf5','#e0598b','#d99a3f','#3fb6a0','#c9a93a','#cf5050','#3fa6c9'];
  let css='';
  Object.keys(custom).forEach((k,i)=>{ const c=palette[i%palette.length];
    css+=`.b-${k}{background:color-mix(in srgb,${c} 22%,transparent);color:${c}}`; });
  st.textContent=css;
}
function stageTasks(stage){
  if(db.templates && Array.isArray(db.templates[stage])) return db.templates[stage];
  return DEFAULT_TEMPLATES[stage]||[];
}
function tasksForStatus(s){
  if(s==='pending')return stageTasks('talk');
  if(db.templates&&Array.isArray(db.templates[s]))return stageTasks(s); // 自訂狀態若有設範本就用
  if(STAGE_LABELS[s])return stageTasks(s);
  return stageTasks('design');
}

let db = load() || seed();

function seed(){
  return {
    members:[
      {id:'m1',name:'設計師A',role:'設計師',rate:300,icon:'🦊',color:'#4f8ef7',capacity:8,leave:[]},
      {id:'m2',name:'設計師B',role:'設計師',rate:250,icon:'🐼',color:'#7c63f5',capacity:8,leave:[]},
      {id:'m3',name:'助理A',role:'助理',rate:150,icon:'🐸',color:'#f06292',capacity:8,leave:[]},
      {id:'m4',name:'助理B',role:'助理',rate:120,icon:'🦉',color:'#f8a948',capacity:8,leave:[]},
    ],
    projects:[]
  };
}
function save(){ try{localStorage.setItem('pmBigTable',JSON.stringify(db));}catch(e){} _localDirty=true; cloudAutoSave(); }
function load(){ try{return JSON.parse(localStorage.getItem('pmBigTable'));}catch(e){return null;} }
// 防覆蓋：記錄「最後成功推上雲端的內容」。本機若有尚未推上去的變更，載入時要保護本機、先推上去，而不是被舊雲端蓋掉。
let _localDirty=false;          // 本機有未同步的變更
let _lastPushedJSON=null;       // 最後一次成功推上雲端的內容快照
let _lastSnapAt=0;              // 上次存「時間戳快照」的時間
const SNAP_KEEP=30;             // 保留最近幾份快照
const SNAP_MIN_GAP=5*60*1000;  // 兩次快照最少間隔（5 分鐘）
// 簡單字串雜湊（用來判斷本機內容是否等於最後推上雲端的內容，可跨重新整理保存）
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return String(h); }
// 開機時判斷本機是否有「尚未推上雲端」的變更：本機內容的雜湊 ≠ 上次推上去的雜湊
function detectBootDirty(){
  try{
    const pushed=localStorage.getItem('pmPushedHash');
    const cur=hashStr(JSON.stringify(db));
    _localDirty = !pushed || pushed!==cur;
  }catch(e){ _localDirty=false; }
}

/* ============ GOOGLE DRIVE 同步 ============ */
const GOOGLE_CLIENT_ID='223765971288-dmqpj1spcq91jj91j29b4oofuf4lervh.apps.googleusercontent.com';
const GOOGLE_API_KEY='AIzaSyA-56ibFOdnQ7yJoeD9BHNZPCxzA8uZywI';
const ADMIN_EMAIL='peggy.cho1012@gmail.com';  // 管理者：登入後自動可彙總看全員
const SHARED_FOLDER_ID='1uEIBVfgczRXv8PZVm2zJYQY7gzuR8-Rx'; // 共用資料夾
const DRIVE_SCOPE='https://www.googleapis.com/auth/drive.file openid email profile';

let gAuth={token:null,email:null,name:null,fileId:null,ready:false,tokenClient:null,gapiReady:false};
let cloudSaveTimer=null;

function gisLoaded(){return typeof google!=='undefined'&&google.accounts&&google.accounts.oauth2;}
function gapiLoaded(){return typeof gapi!=='undefined';}

function initGoogle(){
  if(!gisLoaded()||!gapiLoaded()){setTimeout(initGoogle,300);return;}
  gapi.load('client',async()=>{
    await gapi.client.init({apiKey:GOOGLE_API_KEY,
      discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    gAuth.gapiReady=true;
    restoreSession(); // gapi 準備好後再嘗試沿用上次登入
  });
  gAuth.tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID, scope:DRIVE_SCOPE,
    callback:async(resp)=>{
      if(resp.error){toast('登入失敗：'+resp.error);return;}
      gAuth.token=resp.access_token;
      // 記住權杖與到期時間（expires_in 是秒數）
      const expiresAt=Date.now()+((resp.expires_in||3600)-60)*1000;
      try{localStorage.setItem('pmGoogleToken',JSON.stringify({token:resp.access_token,expiresAt}));}catch(e){}
      gapi.client.setToken({access_token:resp.access_token});
      await afterSignIn();
    }});
  gAuth.ready=true;
  updateCloudBtn();
}

// 重開網頁時，若上次的權杖還沒過期就直接沿用，不再跳授權
function restoreSession(){
  try{
    const saved=JSON.parse(localStorage.getItem('pmGoogleToken')||'null');
    if(saved&&saved.token&&saved.expiresAt&&Date.now()<saved.expiresAt){
      gAuth.token=saved.token;
      gapi.client.setToken({access_token:saved.token});
      afterSignIn();
    }
  }catch(e){}
}

async function afterSignIn(){

const SHARED_FILE_NAME='pmdata-shared.json';

// 找全公司共用檔；管理者沒有就建立，員工找不到就提示
async function ensureSharedFile(){
  if(gAuth.fileId)return gAuth.fileId;
  // 在共用資料夾裡找共用檔
  let q=`name='${SHARED_FILE_NAME}' and trashed=false`;
  if(SHARED_FOLDER_ID)q=`'${SHARED_FOLDER_ID}' in parents and `+q;
  const res=await gapi.client.drive.files.list({q,fields:'files(id,name)',spaces:'drive'});
  if(res.result.files&&res.result.files.length){gAuth.fileId=res.result.files[0].id;return gAuth.fileId;}
  // 找不到：只有管理者能建立共用檔
  if(isAdmin()){
    const meta={name:SHARED_FILE_NAME,mimeType:'application/json'};
    if(SHARED_FOLDER_ID)meta.parents=[SHARED_FOLDER_ID];
    const create=await gapi.client.drive.files.create({resource:meta,fields:'id'});
    gAuth.fileId=create.result.id;
    await cloudPush();
    return gAuth.fileId;
  }
  return null; // 員工且共用檔還沒建立
}

// 從雲端讀取共用資料。重點：若本機有「尚未推上雲端的變更」，絕不被舊雲端覆蓋——改成先把本機推上去。
async function cloudPull(silent){
  try{
    const id=await ensureSharedFile();
    if(!id){ if(!silent)toast('共用資料尚未建立，請先請管理者(peggy)登入一次'); return; }
    const res=await gapi.client.drive.files.get({fileId:id,alt:'media'});
    let data=res.result;
    if(typeof data==='string'){try{data=JSON.parse(data);}catch(e){data=null;}}
    if(data&&data.members&&data.projects){
      const incoming=JSON.stringify(data);
      const localJSON=JSON.stringify(db);
      // 內容相同→不動作
      if(incoming===localJSON){ if(silent)setCloudStatus('已是最新 '+new Date().toLocaleTimeString()); return; }
      // ★防覆蓋核心：本機有未同步變更，且雲端不等於「我最後推上去的版本」
      //   代表兩邊都動過或本機較新 → 不可用雲端蓋本機，改為保護本機、把本機推上去。
      if(_localDirty && incoming!==_lastPushedJSON){
        if(!silent)toast('偵測到本機有未上傳的變更，已保護本機資料並上傳，未被雲端覆蓋');
        await cloudPush();
        return;
      }
      // 背景自動同步時：使用者正在編輯（modal 開著）先不要覆蓋，等下次
      const modalOpen=document.getElementById('modal')&&document.getElementById('modal').classList.contains('open');
      if(silent&&modalOpen)return;
      // 安全：本機沒有未同步變更 → 採用雲端較新的版本
      db=data; localStorage.setItem('pmBigTable',JSON.stringify(db));
      _lastPushedJSON=incoming; _localDirty=false;
      try{localStorage.setItem('pmPushedHash',hashStr(incoming));}catch(e){}
      migrate();
      renderDashboard();renderMembers();
      if(currentView())switchView(currentView());
      if(!silent)toast('已載入全公司共用資料');
      else setCloudStatus('已自動同步 '+new Date().toLocaleTimeString());
    }else if(isAdmin()){
      await cloudPush();
      if(!silent)toast('已初始化全公司共用資料');
    }
  }catch(e){ if(!silent)toast('讀取雲端失敗：'+(e&&e.message?e.message:JSON.stringify(e))); }
}

// 寫入共用檔，並（必要時）另存一份時間戳快照備份，永不覆蓋舊快照。
async function cloudPush(opts){
  if(!gAuth.token)return;
  try{
    const id=await ensureSharedFile();
    if(!id)return;
    const payload=JSON.stringify(db);
    await gapi.client.request({
      path:'/upload/drive/v3/files/'+id, method:'PATCH',
      params:{uploadType:'media'},
      headers:{'Content-Type':'application/json'},
      body:payload});
    _lastPushedJSON=payload; _localDirty=false;
    try{localStorage.setItem('pmPushedHash',hashStr(payload));}catch(e){}
    setCloudStatus('已同步 '+new Date().toLocaleTimeString());
    cloudSaveTimer=null;
    // 視情況另存時間戳快照（節流：至少間隔 SNAP_MIN_GAP，或明確要求）
    if((opts&&opts.snapshot) || Date.now()-_lastSnapAt>=SNAP_MIN_GAP){
      _lastSnapAt=Date.now();
      saveSnapshot(payload).catch(()=>{});
    }
  }catch(e){setCloudStatus('同步失敗');}
}

// 另存一份帶時間戳的快照檔（pmdata-snap-YYYYMMDD-HHMM.json），保留最近 SNAP_KEEP 份。
async function saveSnapshot(payload){
  if(!gAuth.token)return;
  try{
    const d=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const stamp=`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    const name=`pmdata-snap-${stamp}.json`;
    const meta={name,mimeType:'application/json'};
    if(SHARED_FOLDER_ID)meta.parents=[SHARED_FOLDER_ID];
    // 用 multipart 建立含內容的新檔
    const boundary='-------pmsnap'+Date.now();
    const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`+
      JSON.stringify(meta)+`\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n`+
      (payload||JSON.stringify(db))+`\r\n--${boundary}--`;
    await gapi.client.request({
      path:'/upload/drive/v3/files', method:'POST',
      params:{uploadType:'multipart'},
      headers:{'Content-Type':'multipart/related; boundary='+boundary},
      body});
    setCloudStatus('已存快照 '+new Date().toLocaleTimeString());
    pruneSnapshots().catch(()=>{});
  }catch(e){/* 快照失敗不影響主檔 */}
}

// 清理多餘快照，只留最近 SNAP_KEEP 份。
async function pruneSnapshots(){
  try{
    let q=`name contains 'pmdata-snap-' and trashed=false`;
    if(SHARED_FOLDER_ID)q=`'${SHARED_FOLDER_ID}' in parents and `+q;
    const res=await gapi.client.drive.files.list({q,fields:'files(id,name,createdTime)',orderBy:'createdTime desc',pageSize:100,spaces:'drive'});
    const files=(res.result.files||[]);
    if(files.length<=SNAP_KEEP)return;
    const toDelete=files.slice(SNAP_KEEP);
    for(const f of toDelete){ try{ await gapi.client.drive.files.delete({fileId:f.id}); }catch(e){} }
  }catch(e){}
}

// 自動存（防抖，存檔後 1.5 秒寫雲端）

// 自動同步（省資源版）：只在切回 App / 視窗重新取得焦點時拉最新雲端資料，
// 不再每 60 秒背景輪詢，降低請求與耗電。存檔仍會自動推到雲端（Google Drive）。
let lastPullAt=0;
async function autoPullIfIdle(reason){
  if(!gAuth.token||!gAuth.email)return;
  if(cloudSaveTimer)return; // 剛存過先不拉，避免蓋掉自己的內容
  if(Date.now()-lastPullAt<5000)return; // 5 秒內不重複拉
  lastPullAt=Date.now();
  try{ await cloudPull(true); }catch(e){}
}
let _autoSyncBound=false;
let _snapTimer=null;
function startAutoSync(){
  if(_autoSyncBound)return; // 只綁一次，避免重複監聽
  _autoSyncBound=true;
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden)autoPullIfIdle('visible'); });
  window.addEventListener('focus',()=>autoPullIfIdle('focus'));
  // 離開頁面 / 重新整理時：盡力存一份快照（瀏覽器給的時間很短，可能來不及，故另有定時墊底）
  const leaveSnap=()=>{ try{ if(gAuth.token&&_localDirty){ cloudPush({snapshot:true}); } }catch(e){} };
  window.addEventListener('pagehide',leaveSnap);
  window.addEventListener('beforeunload',leaveSnap);
  document.addEventListener('visibilitychange',()=>{ if(document.hidden)leaveSnap(); });
  // 每 5 分鐘墊底：有變更才存快照
  clearInterval(_snapTimer);
  _snapTimer=setInterval(()=>{ if(gAuth.token&&_localDirty){ cloudPush({snapshot:true}); } },5*60*1000);
}

/* ============ COST / PROGRESS CALC ============ */
// mode: 'plan'(預計) | 'actual'(實際)
function aHours(a,mode){return mode==='actual'?(a.hoursActual!=null?a.hoursActual:0):(a.hours||0);}
function taskVarCost(t,mode='plan'){ return t.assignees.reduce((s,a)=>{const m=mById(a.memberId);return s+(m?m.rate*aHours(a,mode):0);},0); }
function taskFixed(t,mode='plan'){ return mode==='actual'?(t.fixedCostActual!=null?t.fixedCostActual:0):(t.fixedCost||0); }
function taskTotalCost(t,mode='plan'){ return taskVarCost(t,mode)+taskFixed(t,mode); }
function taskHours(t,mode='plan'){ return t.assignees.reduce((s,a)=>s+aHours(a,mode),0); }
function taskDur(t,mode='plan'){ return mode==='actual'?(t.durActual||0):(t.durPlan||0); }
function projTasks(p){ return p.workPackages.flatMap(w=>w.tasks); }
function projCost(p,mode='plan'){ return projTasks(p).reduce((s,t)=>s+taskTotalCost(t,mode),0); }
function projHours(p,mode='plan'){ return projTasks(p).reduce((s,t)=>s+taskHours(t,mode),0); }
function projProgress(p){
  const ts=projTasks(p); if(!ts.length)return 0;
  const totW=ts.reduce((s,t)=>s+taskTotalCost(t),0)||ts.length;
  const earned=ts.reduce((s,t)=>s+(taskTotalCost(t)||1)*(t.pct||0)/100,0);
  return Math.round(earned/totW*100);
}
function projTeam(p){
  const ids=new Set(); projTasks(p).forEach(t=>t.assignees.forEach(a=>ids.add(a.memberId)));
  if(p.managerId)ids.add(p.managerId);
  return [...ids].map(mById).filter(Boolean);
}

  let html=`<div class="cards">

  }else{

    html+=`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
      <div style="display:flex;gap:6px;flex-wrap:wrap">

        <select onchange="setFilter('member',this.value)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-size:.76rem;outline:none">
          <option value="">全部人員</option>
          ${memberOpts.map(m=>`<option value="${m.id}" ${dashFilter.member===m.id?'selected':''}>${m.icon} ${m.name}</option>`).join('')}

}

function avatarHTML(m,size=''){
  if(!m)return `<div class="avatar ${size}" style="background:var(--surface3)">—</div>`;
  return `<div class="avatar ${size}" style="background:${m.color}" title="${m.name}">${m.icon||m.name[0]}</div>`;
}

// 計算某人目前被指派的總工時（所有案件、計劃）
function memberTotalHours(mid){
  let h=0;
  db.projects.forEach(p=>projTasks(p).forEach(t=>(t.assignees||[]).forEach(a=>{if(a.memberId===mid)h+=(a.hours||0);})));
  return h;
}
function memberTaskCount(mid){
  let c=0;
  db.projects.forEach(p=>projTasks(p).forEach(t=>{if((t.assignees||[]).some(a=>a.memberId===mid))c++;}));
  return c;
}

// 編輯某階段範本
function stageLabel(stage){ return STAGE_LABELS[stage]||(db.customStatus&&db.customStatus[stage])||STATUS[stage]||stage; }
// 範本項目可寫成「任務名稱」、「任務名稱 | 工時」或「任務名稱 | 工時 | 工期天數」
// 例如「S02-1 平面圖定稿 | 16 | 3」= 預設 16 小時、工期 3 天
function parseTplItem(line){
  const parts=String(line).split('|');
  const name=(parts[0]||'').trim();
  let hours=0, days=0;
  if(parts[1]!=null){ const n=parseFloat(parts[1].replace(/[^0-9.]/g,'')); if(!isNaN(n))hours=n; }
  if(parts[2]!=null){ const d=parseFloat(parts[2].replace(/[^0-9.]/g,'')); if(!isNaN(d))days=d; }
  return {name,hours,days};
}
function tplItemLabel(line){ const {name,hours,days}=parseTplItem(line);
  let suffix='';
  if(hours>0&&days>0)suffix=`（${hours}h・${days}天）`;
  else if(hours>0)suffix=`（${hours}h）`;
  else if(days>0)suffix=`（${days}天）`;
  return name+suffix;
}

function editTemplate(stage){
  if(!canManageMembers()){toast('只有管理者能設定');return;}
  const items=stageTasks(stage);
  const M=document.getElementById('modal');
  const isBuiltin=!!DEFAULT_TEMPLATES[stage];
  M.innerHTML=`<div class="modal"><h3>✏ 編輯範本：${stageLabel(stage)}</h3>
    <div class="desc">一行一個任務，順序即為加入時的順序。<br>
    可選填：<b>任務名稱 | 工時 | 工期天數</b>，例如「平面圖定稿 | 16 | 3」= 預設 16 小時、工期 3 天。<br>
    只填工時也行（平面圖定稿 | 16），或只填名稱都可以。</div>
    <textarea id="tpl-text" rows="14" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:10px;font-size:.82rem;line-height:1.7;outline:none">${items.join('\n')}</textarea>
    <div class="modal-actions">
      <button class="btn sec" onclick="renderMembers();closeModal()">取消</button>
      ${isBuiltin?`<button class="btn sec" onclick="resetTemplate('${stage}')">↺ 還原預設</button>`:''}
      <button class="btn" onclick="saveTemplate('${stage}')">儲存</button>
    </div></div>`;
  M.classList.add('open');
}
function saveTemplate(stage){
  const lines=document.getElementById('tpl-text').value.split('\n').map(s=>s.trim()).filter(Boolean);
  db.templates=db.templates||{};
  db.templates[stage]=lines;
  save();closeModal();renderMembers();toast(stageLabel(stage)+' 範本已更新（'+lines.length+' 項）');
}
function resetTemplate(stage){
  if(!DEFAULT_TEMPLATES[stage])return;
  if(!confirm('還原成系統預設的 SSOP 範本？'))return;
  db.templates=db.templates||{};
  db.templates[stage]=[...DEFAULT_TEMPLATES[stage]];
  save();editTemplate(stage);
}
// 自訂狀態
function addCustomStatus(){
  if(!canManageMembers()){toast('只有管理者能設定');return;}
  const name=prompt('新狀態名稱（例如：丈量中、等待交屋）');
  if(!name||!name.trim())return;
  const label=name.trim();
  if(Object.values(STATUS).includes(label)){toast('已有同名狀態');return;}
  const key='cs'+Date.now().toString(36);
  db.customStatus=db.customStatus||{};
  db.customStatus[key]=label;
  db.templates=db.templates||{};
  if(!db.templates[key])db.templates[key]=[]; // 預設空範本，可再設定
  rebuildStatus();save();renderMembers();
  toast('已新增狀態「'+label+'」，可在下方設定它的任務範本');
}
function renameCustomStatus(key){
  const cur=db.customStatus[key]||'';
  const name=prompt('修改狀態名稱',cur);
  if(!name||!name.trim())return;
  db.customStatus[key]=name.trim();
  rebuildStatus();save();renderMembers();toast('已更名');
}
function deleteCustomStatus(key){
  const used=db.projects.filter(p=>p.status===key);
  if(used.length){ if(!confirm('有 '+used.length+' 個案件正在用這個狀態，刪除後它們會變成「設計中」。確定刪除？'))return;
    used.forEach(p=>p.status='design'); }
  else if(!confirm('刪除狀態「'+db.customStatus[key]+'」？'))return;
  delete db.customStatus[key];
  if(db.templates)delete db.templates[key];
  rebuildStatus();save();renderMembers();renderDashboard();toast('已刪除');
}
// 清空所有案件任務
function clearAllTasks(){
  if(!canManageMembers()){toast('只有管理者能操作');return;}
  if(!confirm('確定清空所有案件的任務？\n案件會保留，但底下工序全部移除，無法復原。'))return;
  if(!confirm('再次確認：真的要清空全部任務嗎？'))return;
  let n=0;
  db.projects.forEach(p=>{
    p.workPackages=[{id:uid('w'),name:'任務',tasks:[]}];
    n++;
  });
  save();renderMembers();renderDashboard();
  if(gAuth.token){ cloudPush(); toast('已清空 '+n+' 個案件的任務，並同步到雲端'); }
  else toast('已清空 '+n+' 個案件的任務（未登入，記得登入後同步）');
}

function pickIcon(ic){document.getElementById('modal').dataset.icon=ic;
  document.querySelectorAll('#iconGrid .icon-opt').forEach(e=>e.classList.toggle('sel',e.textContent===ic));}
function pickColor(c){document.getElementById('modal').dataset.color=c;
  document.querySelectorAll('#colorGrid .color-opt').forEach(e=>e.classList.toggle('sel',e.dataset.c===c));}
function saveMember(id){
  const M=document.getElementById('modal');
  const data={name:document.getElementById('f-name').value.trim()||'未命名',
    email:document.getElementById('f-email').value.trim(),
    role:document.getElementById('f-role').value.trim()||'成員',
    rate:parseInt(document.getElementById('f-rate').value)||0,
    capacity:parseInt(document.getElementById('f-cap').value)||8,
    icon:M.dataset.icon,color:M.dataset.color};
  if(id){Object.assign(mById(id),data);}
  else{db.members.push({id:uid('m'),leave:[],...data});}
  save();closeModal();renderMembers();renderDashboard();
}
function delMember(id){
  if(!canManageMembers()){toast('只有管理者能管理人員');return;}
  if(db.members.length<=1){alert('至少需保留一位人員');return;}
  if(!confirm('刪除此人員？其任務指派將被移除。'))return;
  db.members=db.members.filter(m=>m.id!==id);
  db.projects.forEach(p=>projTasks(p).forEach(t=>t.assignees=t.assignees.filter(a=>a.memberId!==id)));
  db.projects.forEach(p=>{if(p.managerId===id)p.managerId=null;});
  save();renderMembers();renderDashboard();
}

/* ============ SCHEDULE (人員每日工時排程) ============ */
function parseD(s){const a=(s||'').split('-').map(Number);return new Date(a[0],a[1]-1,a[2]);}
function fmtD(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function addDays(s,n){const d=parseD(s);d.setDate(d.getDate()+n);return fmtD(d);}
function daysBetween(a,b){return Math.round((parseD(b)-parseD(a))/86400000);}
function projColorOf(p){return COLORS[db.projects.indexOf(p)%COLORS.length];}
function fmtH(h){return Math.round(h*10)/10;}
function leaveSet(m){const s=new Set();(m.leave||[]).forEach(r=>{let d=r.start;let guard=0;while(d<=r.end&&guard<400){s.add(d);d=addDays(d,1);guard++;}});return s;}

// 台灣 2026 國定假日（預設，可在後台增刪）
const DEFAULT_HOLIDAYS_2026 = ['2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-02-27','2026-02-28','2026-04-03','2026-04-04','2026-04-06','2026-05-01','2026-06-19','2026-09-25','2026-10-09','2026-10-10'];
function holidaySet(){ return new Set(db.holidays||[]); }
function isWeekend(dateStr){ const d=parseD(dateStr).getDay(); return d===0||d===6; }
function isHoliday(dateStr){ return holidaySet().has(dateStr); }
// 是否為工作日（跳過週末＋國定假日）
function isWorkday(dateStr){ return !isWeekend(dateStr) && !isHoliday(dateStr); }
// 從 start 起算，往後找出 n 個「工作日」的日期陣列（含起始日若它是工作日）
function workdaysFrom(start,n){
  const out=[]; let d=start; let guard=0;
  while(out.length<n && guard<2000){ if(isWorkday(d))out.push(d); d=addDays(d,1); guard++; }
  return out;
}

// 建立排程：回傳 {dates, load:{mid:{date:[{projName,color,hours,taskName,status}]}}}
// 解析相依：回傳 {taskId: 有效起始offset(天)}，前置任務全部結束後才開始
function resolveOffsets(p){
  const tasks=projTasks(p);
  const byId={};tasks.forEach(t=>byId[t.id]=t);
  const memo={};const visiting={};
  function eff(t){
    if(memo[t.id]!=null)return memo[t.id];
    if(visiting[t.id])return t.startOffset||0; // 防循環
    visiting[t.id]=true;
    let base=t.startOffset||0;
    (t.deps||[]).forEach(did=>{
      const d=byId[did];if(!d)return;
      const dEnd=eff(d)+Math.max(1,d.durPlan||1); // 前置結束日
      if(dEnd>base)base=dEnd;
    });
    visiting[t.id]=false;memo[t.id]=base;return base;
  }
  tasks.forEach(eff);
  return memo;
}
function isLocked(t){return (t.deps||[]).length>0;}

function buildSchedule(){
  let min=null,max=null;const load={};const lockedDates={}; // mid->date->true
  db.projects.forEach(p=>{
    if(schedStatusFilter&&p.status!==schedStatusFilter)return; // 排程狀態篩選
    const offs=resolveOffsets(p);
    projTasks(p).forEach(t=>{
      const dur=Math.max(1,t.durPlan||1);
      // 有填起始日就用起始日；沒填才用「專案起始日＋偏移」推算
      let tStart=t.startDate||'';
      if(!tStart){ if(!p.startDate)return; tStart=addDays(p.startDate,offs[t.id]||0); }
      const locked=isLocked(t);
      // 工期攤在「工作日」上，跳過週末與國定假日
      const workDates=workdaysFrom(tStart,dur);
      const tEnd=workDates.length?workDates[workDates.length-1]:tStart;
      t.assignees.forEach(a=>{
        if(!a.memberId)return;
        const perDay=(a.hours||0)/dur;
        workDates.forEach(date=>{
          load[a.memberId]=load[a.memberId]||{};
          (load[a.memberId][date]=load[a.memberId][date]||[]).push(
            {projName:p.name,color:projColorOf(p),hours:perDay,taskName:t.name,status:t.status,locked});
          if(locked){lockedDates[a.memberId]=lockedDates[a.memberId]||{};lockedDates[a.memberId][date]=true;}
        });
      });
      if(!min||tStart<min)min=tStart;
      if(!max||tEnd>max)max=tEnd;
    });
  });
  // 把請假日也納入日期範圍
  db.members.forEach(m=>(m.leave||[]).forEach(r=>{
    if(!min||r.start<min)min=r.start; if(!max||r.end>max)max=r.end;
  }));
  return {load,min,max,lockedDates};
}
// 依檢視錨點與天數產生要顯示的日期陣列
let schedAnchor=null;   // 起始顯示日（字串），null=自動
let schedDays=21;       // 一次顯示幾天
let viewMode='plan';    // 計劃/實際/對照
let dashFilter={status:'',member:'',region:'',kw:''}; // 總覽篩選
let dashSort='startDesc'; // 總覽排序：預設開案日 新→舊
let schedStatusFilter=''; // 排程：只看某狀態的案子
let schedMemberFilter=''; // 排程：只看某人
function setSort(v){dashSort=v;renderDashboard();}
function setSchedFilter(key,val){if(key==='status')schedStatusFilter=val;else schedMemberFilter=val;renderSchedule();}
function setFilter(key,val){
  dashFilter[key]=val;
  // 文字輸入時保留游標：只重繪列表不重繪整頁的話較複雜，這裡直接重繪總覽
  renderDashboard();
}
function clearFilter(){dashFilter={status:'',member:'',region:'',kw:''};renderDashboard();}
function setViewMode(m){viewMode=m;const pid=document.getElementById('view-project').dataset.pid;if(pid)renderProject(pid);}
function scheduleDates(min,max){
  const today=fmtD(new Date());
  let start=schedAnchor || today;   // 預設定位到今天
  const dates=[];let d=start,g=0;
  while(g<schedDays){dates.push(d);d=addDays(d,1);g++;}
  return dates;
}
function dayLoad(load,mid,date){const e=(load[mid]&&load[mid][date])||[];return e.reduce((s,x)=>s+x.hours,0);}
function loadBg(h,cap){
  if(h<=0)return 'transparent';
  if(h<=cap)return 'color-mix(in srgb,var(--green) '+Math.min(65,25+h/cap*40)+'%,transparent)';
  if(h<=cap*1.25)return 'color-mix(in srgb,var(--amber) 60%,transparent)';
  return 'color-mix(in srgb,var(--red) 70%,transparent)';
}
function schedToday(){schedAnchor=fmtD(new Date());renderSchedule();}
function schedJump(v){if(v){schedAnchor=v;renderSchedule();}}
function schedShift(n){const base=schedAnchor||fmtD(new Date());schedAnchor=addDays(base,n);renderSchedule();}
function schedSpan(n){schedDays=n;renderSchedule();}

function renderSchedule(){
  const el=document.getElementById('view-schedule');
  const {load,min,max,lockedDates}=buildSchedule();
  const dates=scheduleDates(min,max);
  const today=fmtD(new Date());
  const hasData=db.projects.some(p=>p.startDate&&projTasks(p).length);

  let html=`<div class="section-head"><h2>📅 人員每日工時排程</h2>
    <div style="display:flex;gap:6px">
      <button class="btn sec sm" onclick="openHolidayMgr()">📅 管理假日</button>
      <button class="btn sec sm" onclick="openLeaveMgr()">🏖 管理請假</button>
    </div></div>`;

  // 日期導覽列
  html+=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
    <button class="btn sm" onclick="schedToday()">📍 今天</button>
    <button class="btn sec sm" onclick="schedShift(-7)">← 前一週</button>
    <button class="btn sec sm" onclick="schedShift(7)">後一週 →</button>
    <label style="font-size:.74rem;color:var(--muted)">跳至</label>
    <input type="date" value="${schedAnchor||today}" onchange="schedJump(this.value)"
      style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:.8rem;outline:none">
    <select onchange="schedSpan(parseInt(this.value))" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:.8rem;outline:none">
      <option value="14" ${schedDays===14?'selected':''}>顯示 14 天</option>
      <option value="21" ${schedDays===21?'selected':''}>顯示 21 天</option>
      <option value="30" ${schedDays===30?'selected':''}>顯示 30 天</option>
      <option value="60" ${schedDays===60?'selected':''}>顯示 60 天</option>
    </select>
  </div>`;

  // 排程篩選列
  html+=`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    <span style="font-size:.72rem;color:var(--muted)">篩選：</span>
    <select onchange="setSchedFilter('status',this.value)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:.78rem;outline:none">
      <option value="">全部狀態案件</option>
      ${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${schedStatusFilter===k?'selected':''}>${v}</option>`).join('')}
    </select>
    <select onchange="setSchedFilter('member',this.value)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:.78rem;outline:none">
      <option value="">全部人員</option>
      ${db.members.map(m=>`<option value="${m.id}" ${schedMemberFilter===m.id?'selected':''}>${m.icon} ${m.name}</option>`).join('')}
    </select>
    ${(schedStatusFilter||schedMemberFilter)?`<button onclick="schedStatusFilter='';schedMemberFilter='';renderSchedule()" style="border:none;background:var(--surface3);color:var(--text);border-radius:8px;padding:6px 12px;font-size:.74rem;cursor:pointer">✕ 清除</button>`:''}
  </div>`;

  html+=`<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:.7rem;color:var(--muted);margin-bottom:10px">
      <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:color-mix(in srgb,var(--green) 55%,transparent);vertical-align:-2px"></span> 正常</span>
      <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:color-mix(in srgb,var(--amber) 60%,transparent);vertical-align:-2px"></span> 接近滿載</span>
      <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:color-mix(in srgb,var(--red) 70%,transparent);vertical-align:-2px"></span> 超載/需加班</span>
      <span>🏖 請假　·　🔒 被相依鎖定　·　點格子看明細與可調度人員</span>
    </div>`;

  if(!hasData){
    html+=`<div class="card" style="border-color:var(--amber);margin-bottom:12px;font-size:.78rem;color:var(--amber)">
      ⚠ 目前還沒有「設定開始日 + 任務工時」的專案，下方僅顯示日期與請假。設定後就會排出每日工時。</div>`;
  }

  html+=`<div class="bigtable-wrap"><table class="bt" style="min-width:${120+dates.length*42}px">
    <thead><tr><th style="text-align:left;position:sticky;left:0;z-index:6;min-width:110px">人員 ＼ 日期</th>`;
  dates.forEach(d=>{
    const dt=parseD(d);const we=dt.getDay()===0||dt.getDay()===6;const isToday=d===today;const hol=isHoliday(d);
    const bg=hol?'background:#3a2030;':(we?'background:#23283d;':'');
    html+=`<th style="min-width:42px;${bg}${isToday?'color:var(--accent);box-shadow:inset 0 -2px 0 var(--accent);':''}">
      <div style="font-size:.6rem;${hol?'color:var(--red)':''}">${dt.getMonth()+1}/${dt.getDate()}</div>
      <div style="font-size:.55rem;color:var(--muted)">${hol?'假':['日','一','二','三','四','五','六'][dt.getDay()]}</div></th>`;
  });
  html+=`</tr></thead><tbody>`;

  db.members.forEach(m=>{
    if(schedMemberFilter&&m.id!==schedMemberFilter)return; // 只看選定人員
    const cap=m.capacity||8;const lv=leaveSet(m);
    const total=dates.reduce((s,d)=>s+dayLoad(load,m.id,d),0);
    html+=`<tr><td style="text-align:left;position:sticky;left:0;background:var(--surface);z-index:4">
      <div style="display:flex;align-items:center;gap:7px">${avatarHTML(m,'sm')}
        <div><div style="font-weight:600;font-size:.76rem">${m.name}</div>
        <div style="font-size:.6rem;color:var(--muted)">產能${cap}h · 共${fmtH(total)}h</div></div></div></td>`;
    dates.forEach(d=>{
      const h=dayLoad(load,m.id,d);const onLeave=lv.has(d);
      const locked=lockedDates[m.id]&&lockedDates[m.id][d];
      const dt=parseD(d);const we=dt.getDay()===0||dt.getDay()===6;
      let bg=loadBg(h,cap),content='',border='';
      if(onLeave){bg='color-mix(in srgb,var(--accent2) 30%,transparent)';content='🏖';
        if(h>0)border='border:2px solid var(--red)';} // 請假卻有排工 → 衝突
      else if(h>0)content=`<span style="font-size:.62rem;font-weight:700;color:${h>cap?'#fff':'var(--text)'}">${fmtH(h)}${locked?' 🔒':''}</span>`;
      html+=`<td class="gantt-cell" style="cursor:pointer;background:${bg};${border};${we&&!h&&!onLeave?'background:#1d2236;':''}"
        onclick="scheduleDetail('${m.id}','${d}')" title="${m.name} ${d}：${onLeave?'請假':fmtH(h)+'h'}${locked?'（相依鎖定）':''}">${content}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>
    <div style="font-size:.7rem;color:var(--muted);margin-top:10px">💡 紅框＝請假當天仍排有工作（衝突，需調度）。點任一格可查看該人當天任務，若超載或請假會列出當天有空檔的同事供你調派。</div>`;
  el.innerHTML=html;
}

function scheduleDetail(mid,date){
  const {load}=buildSchedule();
  const m=mById(mid);const cap=m.capacity||8;
  const entries=(load[mid]&&load[mid][date])||[];
  const h=entries.reduce((s,x)=>s+x.hours,0);
  const onLeave=leaveSet(m).has(date);
  const over=h>cap;

  // 找當天有空檔的人（產能未滿、且未請假）
  const candidates=db.members.filter(x=>x.id!==mid).map(x=>{
    const xh=dayLoad(load,x.id,date);const xlv=leaveSet(x).has(date);
    return {x,used:xh,free:(x.capacity||8)-xh,onLeave:xlv};
  }).filter(c=>!c.onLeave&&c.free>0).sort((a,b)=>b.free-a.free);

  const M=document.getElementById('modal');
  let body=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">${avatarHTML(m)}
    <div><div style="font-weight:700">${m.name}</div><div style="font-size:.72rem;color:var(--muted)">${date}（${['週日','週一','週二','週三','週四','週五','週六'][parseD(date).getDay()]}）</div></div></div>`;

  if(onLeave)body+=`<div class="card" style="border-color:var(--accent2);margin-bottom:10px"><b style="color:var(--accent2)">🏖 此人當天請假</b>${h>0?`<div style="color:var(--red);font-size:.78rem;margin-top:4px">⚠ 但仍排有 ${fmtH(h)}h 工作，需調度給他人</div>`:''}</div>`;
  else body+=`<div class="card" style="margin-bottom:10px;${over?'border-color:var(--red)':''}">
    <div style="font-size:.74rem;color:var(--muted)">當天工時 / 產能</div>
    <div style="font-size:1.2rem;font-weight:800;color:${over?'var(--red)':'var(--green)'}">${fmtH(h)}h / ${cap}h ${over?`<span style="font-size:.75rem">超載 ${fmtH(h-cap)}h</span>`:''}</div></div>`;

  if(entries.length){
    body+=`<div style="font-size:.74rem;font-weight:700;margin-bottom:6px">當天任務</div>`;
    entries.forEach(e=>{body+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:.78rem">
      <span style="width:10px;height:10px;border-radius:3px;background:${e.color};flex-shrink:0"></span>
      <span style="flex:1">${e.projName} · ${e.taskName}${e.locked?' <span title="有前置任務、時間被鎖定">🔒</span>':''}</span>
      <span style="font-family:var(--mono);color:var(--gold)">${fmtH(e.hours)}h</span></div>`;});
    if(entries.some(e=>e.locked))body+=`<div style="font-size:.7rem;color:var(--amber);margin-top:4px">🔒 標記的任務有前置相依，時間卡死、不建議任意挪動</div>`;
  }else if(!onLeave){body+=`<div style="font-size:.78rem;color:var(--muted)">當天沒有排定任務</div>`;}

  if(over||onLeave){
    body+=`<div style="font-size:.74rem;font-weight:700;margin:12px 0 6px;color:var(--accent)">🔄 點人員即可把當天工作轉給他</div>`;
    if(candidates.length){
      candidates.forEach(c=>{body+=`<div onclick="reassignDay('${mid}','${date}','${c.x.id}')"
        style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;transition:border-color .15s"
        onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
        ${avatarHTML(c.x,'sm')}<span style="flex:1;font-size:.78rem">${c.x.name} <span style="color:var(--muted);font-size:.7rem">${c.x.role}</span></span>
        <span style="font-size:.72rem;color:var(--green)">可接 ${fmtH(c.free)}h</span>
        <span style="font-size:.8rem;color:var(--accent);font-weight:700">轉給 →</span></div>`;});
    }else body+=`<div style="font-size:.76rem;color:var(--amber)">⚠ 當天所有人都已滿載或請假，建議調整工期或外包</div>`;
  }

  M.innerHTML=`<div class="modal"><h3>每日負荷明細</h3>${body}
    <div class="modal-actions" style="flex-wrap:wrap;gap:8px">
      <button class="btn sec" onclick="closeModal()">關閉</button>
      <button class="btn ${onLeave?'sec':''}" style="${onLeave?'':'background:var(--accent2)'}" onclick="toggleLeaveDay('${mid}','${date}')">
        ${onLeave?'↩ 取消這天請假':'🏖 標記這天('+date.slice(5)+')請假'}</button>
      <button class="btn sec" onclick="openLeaveMgr('${mid}')">設定多天請假</button>
    </div></div>`;
  M.classList.add('open');
}

// 找出某人在某天涉及的所有任務（含整段，不只當天）
function tasksOfMemberOnDate(mid,date){
  const out=[];
  db.projects.forEach(p=>{
    if(!p.startDate)return;
    const offs=resolveOffsets(p);
    projTasks(p).forEach(t=>{
      const dur=Math.max(1,t.durPlan||1);
      const start=addDays(p.startDate,offs[t.id]||0);
      const end=addDays(start,dur-1);
      if(date>=start&&date<=end){
        t.assignees.forEach((a,idx)=>{if(a.memberId===mid)out.push({p,t,idx});});
      }
    });
  });
  return out;
}
// 把某人當天的任務整段轉給另一人
function reassignDay(fromMid,date,toMid){
  const items=tasksOfMemberOnDate(fromMid,date);
  if(!items.length){alert('當天沒有可轉移的任務');return;}
  const from=mById(fromMid),to=mById(toMid);
  const names=items.map(i=>i.t.name).join('、');
  if(!confirm(`將「${from.name}」在 ${date} 的任務轉給「${to.name}」？\n\n任務：${names}\n（注意：任務會整段轉移，非僅當天）`))return;
  items.forEach(({t,idx})=>{t.assignees[idx].memberId=toMid;});
  save();renderSchedule();scheduleDetail(fromMid,date);
}

// 切換「某人某一天」請假（最直覺：點格子→一鍵標記）
function leaveDaysArr(m){const s=leaveSet(m);return [...s].sort();}
function compressDays(days){
  days=[...new Set(days)].sort();const ranges=[];let i=0;
  while(i<days.length){let st=days[i],en=days[i];
    while(i+1<days.length&&addDays(en,1)===days[i+1]){en=days[i+1];i++;}
    ranges.push({start:st,end:en});i++;}
  return ranges;
}
function toggleLeaveDay(mid,date){
  const m=mById(mid);m.leave=m.leave||[];
  let days=leaveDaysArr(m);
  if(days.includes(date))days=days.filter(d=>d!==date); // 取消
  else days.push(date);                                  // 新增
  m.leave=compressDays(days);
  save();
  renderSchedule();
  scheduleDetail(mid,date); // 重新整理明細視窗，按鈕文字即時切換
}

/* ============ WORKLOAD (跨專案綜合負荷) ============ */
// 每人在所有「未完成」專案的明細
function memberWorkload(mid){
  const items=[]; // {projName, projId, taskName, hours, cost, status}
  db.projects.forEach(p=>{
    projTasks(p).forEach(t=>{
      t.assignees.filter(a=>a.memberId===mid).forEach(a=>{
        const m=mById(mid);
        items.push({projId:p.id,projName:p.name,projStatus:p.status,
          taskName:t.name,taskStatus:t.status||'todo',
          hours:a.hours||0,cost:(m?m.rate:0)*(a.hours||0)});
      });
    });
  });
  return items;
}
function renderWorkload(){
  const el=document.getElementById('view-workload');
  // 計算每人彙總（排除已完成任務的負荷，但仍顯示）
  const rows=db.members.map(m=>{
    const items=memberWorkload(m.id);
    const totalH=items.reduce((s,i)=>s+i.hours,0);
    const totalC=items.reduce((s,i)=>s+i.cost,0);
    // 進行中(未完成)工時 = 排除已完成任務
    const openH=items.filter(i=>i.taskStatus!=='done').reduce((s,i)=>s+i.hours,0);
    const projCount=new Set(items.map(i=>i.projId)).size;
    return {m,items,totalH,totalC,openH,projCount};
  }).sort((a,b)=>b.openH-a.openH); // 負荷高的排前面

  const maxH=Math.max(1,...rows.map(r=>r.totalH));
  const grandH=rows.reduce((s,r)=>s+r.totalH,0);
  const grandC=rows.reduce((s,r)=>s+r.totalC,0);
  const avgH=rows.length?Math.round(grandH/rows.length):0;

  let html=`<div class="cards">
    <div class="card"><div class="lbl">團隊總工時</div><div class="val" style="color:var(--accent)">${grandH}h</div><div class="sub">所有專案合計</div></div>
    <div class="card"><div class="lbl">人均工時</div><div class="val" style="color:var(--accent2)">${avgH}h</div><div class="sub">平均每人負荷</div></div>
    ${showMoney()?`<div class="card"><div class="lbl">總人力成本</div><div class="val" style="color:var(--gold);font-size:1.2rem">$${grandC.toLocaleString()}</div></div>`:''}
  </div>
  <div class="section-head"><h2>⚖ 各成員綜合工作量</h2>
    <span style="font-size:.7rem;color:var(--muted)">紅線＝人均，超過代表負荷偏重</span></div>`;

  html+=`<div class="bigtable-wrap" style="padding:18px">`;
  rows.forEach(r=>{
    const pct=r.totalH/maxH*100;
    const overAvg=r.totalH>avgH&&avgH>0;
    const avgPct=avgH/maxH*100;
    html+=`<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;cursor:pointer" onclick="toggleWL('${r.m.id}')">
        ${avatarHTML(r.m)}
        <div style="flex:1">
          <div style="font-weight:700;font-size:.9rem">${r.m.name}
            <span style="font-size:.7rem;color:var(--muted);font-weight:400">${r.m.role}${showMoney()?' · $'+r.m.rate+'/h':''}</span></div>
          <div style="font-size:.7rem;color:var(--muted)">參與 ${r.projCount} 個專案 · 未完成 ${r.openH}h</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--mono);font-weight:700;color:${overAvg?'var(--amber)':'var(--text)'}">${r.totalH}h</div>
          <div style="font-family:var(--mono);font-size:.72rem;color:var(--gold)">${showMoney()?'$'+r.totalC.toLocaleString():''}</div>
        </div>
        <span style="color:var(--muted);font-size:.8rem" id="wl-caret-${r.m.id}">▸</span>
      </div>
      <div style="position:relative;height:22px;background:var(--surface2);border-radius:5px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${r.m.color};border-radius:5px;transition:width .4s"></div>
        ${avgH>0?`<div style="position:absolute;top:-2px;bottom:-2px;left:${avgPct}%;width:2px;background:var(--red);z-index:2"></div>`:''}
      </div>
      <div id="wl-detail-${r.m.id}" style="display:none;margin-top:8px;padding-left:42px"></div>
    </div>`;
  });
  html+=`</div>`;

  if(!db.projects.length){
    html=`<div class="empty"><div class="ico">⚖</div><div style="font-weight:700">還沒有專案</div>
      <div style="font-size:.82rem;margin-top:6px">建立專案並指派人員後，這裡會顯示每個人的綜合負荷</div></div>`;
  }
  el.innerHTML=html;
}
function toggleWL(mid){
  const d=document.getElementById('wl-detail-'+mid);
  const caret=document.getElementById('wl-caret-'+mid);
  if(d.style.display==='none'){
    const items=memberWorkload(mid);
    // 依專案分組
    const byProj={};
    items.forEach(i=>{(byProj[i.projId]=byProj[i.projId]||{name:i.projName,status:i.projStatus,tasks:[]}).tasks.push(i);});
    let h='';
    if(!items.length){h=`<div style="font-size:.74rem;color:var(--muted)">目前沒有被指派任何任務</div>`;}
    else{
      Object.values(byProj).forEach(pg=>{

          </div></div>`;

    }
    d.innerHTML=h;d.style.display='block';caret.textContent='▾';

}

  const tasks=wiz.useStdTasks?tasksForStatus(wiz.status):[];

    workPackages:[{
      id:uid('w'),name:wiz.status==='engineering'?'工程流程':'設計流程',
      tasks:tasks.map((tn,i)=>({
        id:uid('t'),name:tn,
        assignees: partList.length?[{memberId:partList[i%partList.length],hours:8}]:[],
        fixedCost:0,fixedCostName:'',fixedCostActual:null,
        durPlan:perTaskDur,durActual:0,startActualOffset:null,
        startOffset:i*perTaskDur,
        pct:0,status:'todo'
      }))
    }]
  };
  db.projects.push(proj);save();closeWizard();
  switchView('dashboard');openProject(proj.id);
}

/* ============ PROJECT DETAIL (BIG TABLE) ============ */
function openProject(id){
  const p=pById(id);if(!p)return;
  switchView('dashboard');
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-project').classList.add('active');
  renderProject(id);
}

function renderProject(id){
  const p=pById(id);if(!p)return;
  const el=document.getElementById('view-project');
  const team=projTeam(p);
  const offs=resolveOffsets(p);
  const tDate=t=>{ if(t.startDate)return t.startDate; if(p.startDate)return addDays(p.startDate,offs[t.id]||0); return ''; };
  let maxDur=Math.max(p.duration||6, ...projTasks(p).map(t=>Math.max((offs[t.id]||0)+(t.durPlan||1),(t.startActualOffset||offs[t.id]||0)+(t.durActual||0))),6);
  if(p.startDate){
    projTasks(p).forEach(t=>{ const d=tDate(t); if(d){ const end=daysBetween(p.startDate,d)+(t.durPlan||1); if(end>maxDur)maxDur=end; } });
  }
  const mode=viewMode; // 'plan' | 'actual' | 'both'
  const costPlan=projCost(p,'plan'),costAct=projCost(p,'actual');
  const hoursPlan=projHours(p,'plan'),hoursAct=projHours(p,'actual');
  const cost=mode==='actual'?costAct:costPlan;
  const hours=mode==='actual'?hoursAct:hoursPlan;
  const prog=projProgress(p);
  const mgr=mById(p.managerId);
  const budgetUse=p.budget?Math.round(cost/p.budget*100):0;

  let html=`<div class="back-btn" onclick="switchView('dashboard')">← 返回總覽</div>
    <div class="proj-card-top">
      <div class="proj-title" style="font-size:1.3rem">${p.name}
        <span class="badge b-${p.status}">${STATUS[p.status]}</span></div>
      <div style="display:flex;gap:6px">
        ${p.notionUrl?`<a class="btn sec sm" href="${p.notionUrl}" target="_blank" rel="noopener" style="text-decoration:none">🔗 Notion</a>`:''}
        <button class="btn sec sm" onclick="editProjectMeta('${p.id}')">⚙ 設定</button>
        <button class="btn danger sm" onclick="delProject('${p.id}')">刪除</button>
      </div>
    </div>
    <div class="proj-meta" style="margin-bottom:14px">
      ${mgr?`<span>👑 <b>${mgr.name}</b></span>`:''}
      ${p.dept?`<span>🏢 <b>${p.dept}</b></span>`:''}
      ${p.startDate?`<span>📅 <b>${p.startDate}</b> 起</span>`:''}
      ${p.dueDate?`<span>🎯 期望 <b>${p.dueDate}</b></span>`:''}
    </div>`;

  // 計劃/實際/對照 切換
  html+=`<div style="display:flex;gap:6px;margin-bottom:14px;background:var(--surface2);border-radius:10px;padding:4px;width:fit-content">
    ${[['plan','📐 計劃'],['actual','✅ 實際'],['both','🔀 對照']].map(([k,l])=>
      `<button onclick="setViewMode('${k}')" style="border:none;border-radius:7px;padding:7px 14px;font-size:.78rem;font-weight:700;cursor:pointer;
        background:${mode===k?'var(--accent)':'transparent'};color:${mode===k?'#fff':'var(--muted)'}">${l}</button>`).join('')}
  </div>`;

  // SUMMARY CARDS
  if(mode==='both'){
    const cVar=costAct-costPlan, hVar=hoursAct-hoursPlan;
    html+=`<div class="cards">
      ${showMoney()?`<div class="card"><div class="lbl">總預算</div><div class="val" style="color:var(--gold);font-size:1.15rem">$${(p.budget||0).toLocaleString()}</div></div>
      <div class="card"><div class="lbl">成本 計劃→實際</div><div class="val" style="font-size:1.05rem"><span style="color:var(--muted)">$${costPlan.toLocaleString()}</span> <span style="color:${costAct>costPlan?'var(--red)':'var(--green)'}">→$${costAct.toLocaleString()}</span></div><div class="sub" style="color:${cVar>0?'var(--red)':'var(--green)'}">${cVar>=0?'+':''}$${cVar.toLocaleString()} 差異</div></div>`:''}
      <div class="card"><div class="lbl">工時 計劃→實際</div><div class="val" style="font-size:1.05rem"><span style="color:var(--muted)">${hoursPlan}h</span> <span style="color:${hoursAct>hoursPlan?'var(--red)':'var(--green)'}">→${hoursAct}h</span></div><div class="sub" style="color:${hVar>0?'var(--red)':'var(--green)'}">${hVar>=0?'+':''}${hVar}h 差異</div></div>
      <div class="card"><div class="lbl">完成進度</div><div class="val" style="color:var(--green)">${prog}%</div></div>
    </div>`;
  }else{
    html+=`<div class="cards">
      ${showMoney()?`<div class="card"><div class="lbl">總預算</div><div class="val" style="color:var(--gold);font-size:1.2rem">$${(p.budget||0).toLocaleString()}</div></div>
      <div class="card"><div class="lbl">${mode==='actual'?'實際成本':'預估成本'}</div><div class="val" style="color:${budgetUse>100?'var(--red)':'var(--green)'};font-size:1.2rem">$${cost.toLocaleString()}</div><div class="sub">${budgetUse}% 預算</div></div>`:''}
      <div class="card"><div class="lbl">${mode==='actual'?'實際工時':'預估工時'}</div><div class="val" style="color:var(--accent)">${hours}h</div></div>
      <div class="card"><div class="lbl">完成進度</div><div class="val" style="color:var(--green)">${prog}%</div></div>
    </div>`;
  }

  // BIG TABLE
  const modeLabel=mode==='actual'?'實際':mode==='both'?'計劃→實際':'計劃';
  const selCount=taskSel.size;
  html+=`<div class="section-head"><h2>📋 任務大表（${modeLabel}）</h2>
    <div style="display:flex;gap:6px">
      <button class="btn sec sm" style="${taskEditMode?'background:var(--accent);color:#fff':''}" onclick="toggleEditMode('${p.id}')">${taskEditMode?'✓ 完成調整':'✏ 調整'}</button>
      <button class="btn sm" onclick="addTask('${p.id}','${p.workPackages[0].id}')">＋ 任務</button>
    </div></div>`;
  // 批次操作列（只有調整模式才出現）
  if(taskEditMode){
    html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;background:var(--surface2);padding:8px 10px;border-radius:10px">
      <label style="font-size:.74rem;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer">
        <input type="checkbox" ${selCount&&selCount===projTasks(p).length?'checked':''} onclick="toggleSelectAll('${p.id}')"> 全選</label>
      ${selCount?`<span style="font-size:.74rem;color:var(--accent)">已選 ${selCount} 項</span>
        <button class="btn danger sm" onclick="batchDeleteTasks('${p.id}')">🗑 刪除選取</button>
        <button class="btn sec sm" onclick="taskSel.clear();renderProject('${p.id}')">取消選取</button>`:'<span style="font-size:.72rem;color:var(--muted)">勾選可批次刪除；▲▼ 調整順序</span>'}
    </div>`;
  }
  // 欄位開關（手機精簡用）。任務名稱與狀態固定常駐，其餘可自選。
  const cp=db.colPrefs||{};
  const optCols=[['owner','負責人'],['start','起始日'],['hours','工時'],['vcost','變動成本'],['fcost','固定成本'],['tcost','總成本'],['dur','工期'],['pct','完成%']];
  html+=`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;background:var(--surface2);padding:8px 10px;border-radius:10px">
    <span style="font-size:.72rem;color:var(--muted)">顯示欄位：</span>
    ${optCols.map(([k,label])=>`<button onclick="toggleCol('${p.id}','${k}')" style="border:none;border-radius:14px;padding:4px 10px;font-size:.72rem;cursor:pointer;${cp[k]?'background:var(--accent);color:#fff':'background:var(--surface3);color:var(--muted)'}">${cp[k]?'✓ ':''}${label}</button>`).join('')}
  </div>`;

  // 時間軸日期範圍：涵蓋專案起始日 ~ 最後一個任務結束日，並確保今天在內
  const rulerStart=p.startDate||'';
  const todayStr=fmtD(new Date());
  // 先算任務日期，供時間軸用
  const taskDate=t=>{
    if(t.startDate)return t.startDate;
    if(p.startDate)return addDays(p.startDate,offs[t.id]||0);
    return '';
  };
  let ganttDates=[];
  if(rulerStart){
    const allT=[]; p.workPackages.forEach(wp=>wp.tasks.forEach(t=>allT.push(t)));
    let gridStart=rulerStart, gridEnd=addDays(rulerStart,maxDur-1);
    allT.forEach(t=>{ const sd=taskDate(t); if(sd){ if(sd<gridStart)gridStart=sd; const ed=addDays(sd,Math.max(1,t.durPlan||1)-1); if(ed>gridEnd)gridEnd=ed; } });
    if(todayStr<gridStart)gridStart=todayStr;
    if(todayStr>gridEnd)gridEnd=todayStr;
    // 今天前面保留幾天可往左拉；今天後面也多留一些空間
    const back=addDays(todayStr,-7); if(back<gridStart)gridStart=back;
    const fwd=addDays(todayStr,14); if(fwd>gridEnd)gridEnd=fwd;
    const span=Math.max(1,daysBetween(gridStart,gridEnd)+1);
    for(let i=0;i<span;i++)ganttDates.push(addDays(gridStart,i));
  }
  // 凍結欄定義：依欄位開關決定哪些欄出現。任務名稱、狀態固定。
  const fzCols=[];
  if(taskEditMode){ fzCols.push({key:'chk',w:34}); fzCols.push({key:'mv',w:56}); }
  fzCols.push({key:'name',w:120});
  if(cp.owner)fzCols.push({key:'owner',w:60});
  if(cp.start)fzCols.push({key:'start',w:54});
  if(cp.hours)fzCols.push({key:'hours',w:54});
  if(cp.vcost)fzCols.push({key:'vcost',w:70});
  if(cp.fcost)fzCols.push({key:'fcost',w:64});
  if(cp.tcost)fzCols.push({key:'tcost',w:74});
  if(cp.dur)fzCols.push({key:'dur',w:54});
  if(cp.pct)fzCols.push({key:'pct',w:70});
  fzCols.push({key:'status',w:64});
  const hasCol=k=>fzCols.some(c=>c.key===k);
  // 算每欄的 left 累積位移
  let acc=0; const fzLeft={}; fzCols.forEach(c=>{ fzLeft[c.key]=acc; acc+=c.w; });
  const fzTotal=acc; // 凍結區總寬
  const fz=(key,extra='')=>`class="fz" style="left:${fzLeft[key]}px;min-width:${fzCols.find(c=>c.key===key).w}px;max-width:${fzCols.find(c=>c.key===key).w}px;${extra}"`;

  // 時間軸日期表頭
  let dateHeaders='';
  ganttDates.forEach(d=>{
    const dt=parseD(d);const we=isWeekend(d);const isToday=d===todayStr;const hol=isHoliday(d);
    const bg=isToday?'background:color-mix(in srgb,var(--red) 28%,transparent);':(hol?'background:#3a2030;':(we?'background:#23283d;':''));
    dateHeaders+=`<th style="min-width:40px;${bg}${isToday?'color:#fff;box-shadow:inset 0 -3px 0 var(--red);':''}" ${isToday?'id="ganttToday"':''}>
      <div style="font-size:.58rem;${isToday?'color:#fff;font-weight:700':(hol?'color:var(--red)':'')}">${dt.getMonth()+1}/${dt.getDate()}</div>
      <div style="font-size:.52rem;color:${isToday?'#fff':'var(--muted)'}">${isToday?'今天':(hol?'假':['日','一','二','三','四','五','六'][dt.getDay()])}</div></th>`;
  });
  const dateColCount=ganttDates.length;
  html+=`<div class="bigtable-wrap" id="taskTableWrap"><table class="bt" style="min-width:${fzTotal+dateColCount*40+40}px">
    <thead><tr>
      ${taskEditMode?`<th ${fz('chk')}></th><th ${fz('mv')}>排序</th>`:''}
      <th ${fz('name','text-align:left')}>任務名稱</th>${hasCol('owner')?`<th ${fz('owner')}>負責人</th>`:''}${hasCol('start')?`<th ${fz('start')}>起始日</th>`:''}${hasCol('hours')?`<th ${fz('hours')}>工時</th>`:''}${hasCol('vcost')?`<th ${fz('vcost')}>變動成本</th>`:''}${hasCol('fcost')?`<th ${fz('fcost')}>固定成本</th>`:''}${hasCol('tcost')?`<th ${fz('tcost')}>總成本</th>`:''}${hasCol('dur')?`<th ${fz('dur')}>工期</th>`:''}${hasCol('pct')?`<th ${fz('pct')}>完成％</th>`:''}<th ${fz('status')}>狀態</th>${dateHeaders}<th></th>
    </tr></thead><tbody>`;

  const cmp=(plan,act,unit='',isMoney=false)=>{
    if(isMoney&&!showMoney())return '—';
    const f=v=>isMoney?'$'+v.toLocaleString():v+unit;
    if(mode==='plan')return f(plan);
    if(mode==='actual')return f(act);
    return `<div class="plan-actual"><span class="pa-plan">${f(plan)}</span><span class="pa-actual" style="color:${act>plan?'var(--red)':(act<plan&&act>0?'var(--green)':'var(--text)')}">${act||act===0?f(act):'—'}</span></div>`;
  };

  p.workPackages.forEach(wp=>{
    const colspan=fzCols.length+ganttDates.length+1;
    html+=`<tr class="wp-row"><td colspan="${colspan}">📦 ${wp.name}</td></tr>`;
    if(!wp.tasks.length){
      html+=`<tr><td colspan="${colspan}" style="color:var(--muted);padding:14px">尚無任務，點右上「＋ 任務」新增</td></tr>`;
    }
    // 顯示用排序：有起始日的依日期；都沒有的維持建立順序
    const ordered=wp.tasks.map((t,idx)=>({t,idx})).sort((a,b)=>{
      const da=taskDate(a.t), db_=taskDate(b.t);
      if(da&&db_){ if(da!==db_)return da<db_?-1:1; return a.idx-b.idx; }
      if(da&&!db_)return -1;
      if(!da&&db_)return 1;
      return a.idx-b.idx; // 都沒日期→建立順序
    });
    ordered.forEach((o,pos)=>{
      const t=o.t;
      const assignees=t.assignees.map(a=>mById(a.memberId)).filter(Boolean);
      const locked=isLocked(t);
      const checked=taskSel.has(t.id)?'checked':'';
      const editCells=taskEditMode?`
        <td class="fz" style="left:${fzLeft['chk']}px" onclick="event.stopPropagation();toggleTaskSel('${p.id}','${t.id}')"><input type="checkbox" ${checked} onclick="event.stopPropagation();toggleTaskSel('${p.id}','${t.id}')"></td>
        <td class="fz" style="left:${fzLeft['mv']}px;white-space:nowrap">
          <button class="mvbtn" ${pos===0?'disabled':''} onclick="event.stopPropagation();moveTask('${p.id}','${wp.id}','${t.id}',-1)" title="上移">▲</button>
          <button class="mvbtn" ${pos===ordered.length-1?'disabled':''} onclick="event.stopPropagation();moveTask('${p.id}','${wp.id}','${t.id}',1)" title="下移">▼</button>
          ${locked?'<span title="有相依，鎖定不可移動">🔒</span>':''}
        </td>`:'';
      const delCell=taskEditMode?`<td><button class="btn danger sm" onclick="event.stopPropagation();delTask('${p.id}','${wp.id}','${t.id}')">✕</button></td>`:'<td></td>';
      // 時間軸日期格子（同一列，接在狀態後面）
      const sd=taskDate(t); const dur=Math.max(1,t.durPlan||1);
      const planColor=locked?'var(--accent2)':'var(--accent)';
      // 計劃工期攤在「工作日」上，跳過週末與假日（與排程一致）
      const planSet=sd?new Set(workdaysFrom(sd,dur)):new Set();
      // 實際工期：用實際起始日（沒填就沿用計劃起始日）往後攤工作日
      const aDur=t.durActual||0;
      const aStart=sd; // 目前實際起始沿用計劃起始日
      const actSet=(aStart&&aDur>0)?new Set(workdaysFrom(aStart,aDur)):new Set();
      let dayCells='';
      ganttDates.forEach((d,i)=>{
        const we=isWeekend(d), hol=isHoliday(d), isToday=d===todayStr;
        let bg=hol?'#3a2030':(we?'#23283d':'transparent');
        const inPlan=mode!=='actual'&&planSet.has(d);
        const inAct=mode!=='plan'&&actSet.has(d);
        if(mode==='both'){
          dayCells+=`<td class="gantt-cell" style="background:${bg};padding:2px!important;${isToday?'box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--red) 50%,transparent);':''}" onclick="editTask('${p.id}','${wp.id}','${t.id}')">
            <div style="height:7px;border-radius:2px;background:${inPlan?planColor:'transparent'}"></div>
            <div style="height:5px;border-radius:2px;margin-top:1px;background:${inAct?'var(--green)':'transparent'}"></div></td>`;
        }else{
          const on=mode==='actual'?inAct:inPlan;
          const col=mode==='actual'?'var(--green)':planColor;
          if(on)bg=col;
          dayCells+=`<td class="gantt-cell" style="background:${bg};${isToday?'box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--red) 45%,transparent);':''}" onclick="editTask('${p.id}','${wp.id}','${t.id}')"></td>`;
        }
      });
      html+=`<tr style="cursor:pointer">
        ${editCells}
        <td ${fz('name','text-align:left;font-weight:500')} onclick="editTask('${p.id}','${wp.id}','${t.id}')">${t.name}${locked&&!taskEditMode?' 🔒':''}</td>
        ${hasCol('owner')?`<td ${fz('owner')} onclick="editTask('${p.id}','${wp.id}','${t.id}')"><div class="avatar-stack" style="justify-content:center">${assignees.length?assignees.map(m=>avatarHTML(m,'sm')).join(''):'<span style="color:var(--muted)">—</span>'}</div></td>`:''}
        ${hasCol('start')?`<td ${fz('start','font-family:var(--mono);color:var(--green);white-space:nowrap;font-size:.72rem')} onclick="editTask('${p.id}','${wp.id}','${t.id}')">${taskDate(t)?taskDate(t).slice(5):'—'}</td>`:''}
        ${hasCol('hours')?`<td ${fz('hours','font-family:var(--mono);color:var(--green)')} onclick="editTask('${p.id}','${wp.id}','${t.id}')">${cmp(taskHours(t,'plan'),taskHours(t,'actual'),'h')}</td>`:''}
        ${hasCol('vcost')?`<td ${fz('vcost','font-family:var(--mono);color:var(--gold)')} onclick="editTask('${p.id}','${wp.id}','${t.id}')">${cmp(taskVarCost(t,'plan'),taskVarCost(t,'actual'),'',true)}</td>`:''}
        ${hasCol('fcost')?`<td ${fz('fcost','font-family:var(--mono);color:var(--gold)')} onclick="editTask('${p.id}','${wp.id}','${t.id}')">${cmp(taskFixed(t,'plan'),taskFixed(t,'actual'),'',true)}</td>`:''}
        ${hasCol('tcost')?`<td ${fz('tcost','font-family:var(--mono);color:var(--gold);font-weight:700')} onclick="editTask('${p.id}','${wp.id}','${t.id}')">${cmp(taskTotalCost(t,'plan'),taskTotalCost(t,'actual'),'',true)}</td>`:''}
        ${hasCol('dur')?`<td ${fz('dur','font-family:var(--mono);color:var(--green)')} onclick="editTask('${p.id}','${wp.id}','${t.id}')">${cmp(taskDur(t,'plan'),taskDur(t,'actual'),'天')}</td>`:''}
        ${hasCol('pct')?`<td ${fz('pct')} onclick="editTask('${p.id}','${wp.id}','${t.id}')"><div class="pct-bar"><div style="width:${t.pct||0}%"></div></div><div style="font-size:.66rem;color:var(--muted);margin-top:2px">${t.pct||0}%</div></td>`:''}
        <td ${fz('status')} onclick="editTask('${p.id}','${wp.id}','${t.id}')"><span class="badge b-${t.status||'todo'}">${TASK_STATUS[t.status||'todo']}</span></td>
        ${dayCells}
        ${delCell}
      </tr>`;
    });
  });
  html+=`</tbody></table></div>`;
  if(mode==='both')html+=`<div style="font-size:.7rem;color:var(--muted);margin-top:8px">時間軸：藍/紫＝計劃工期，綠＝實際；灰底＝週末、紅底＝假日、紅框＝今天。對照模式上排＝計劃、下排＝實際。</div>`;
  else html+=`<div style="font-size:.7rem;color:var(--muted);margin-top:8px">時間軸格子：每格一天，灰底＝週末、紅底＝假日、紅框＝今天。一進來今天在最前面，可往左拉看過去、往右拉看未來。</div>`;

  // RESOURCE HISTOGRAM
  html+=`<div class="section-head"><h2>👥 資源用量分配（${modeLabel}）</h2></div><div class="bigtable-wrap" style="padding:16px">`;
  const maxH=Math.max(1,...team.map(m=>Math.max(memberHoursInProj(p,m.id,'plan'),memberHoursInProj(p,m.id,'actual'))));
  team.forEach(m=>{
    const hP=memberHoursInProj(p,m.id,'plan'),hA=memberHoursInProj(p,m.id,'actual');
    const cP=memberCostInProj(p,m.id,'plan'),cA=memberCostInProj(p,m.id,'actual');
    if(mode==='both'){
      html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        ${avatarHTML(m,'sm')}
        <div style="width:80px;font-size:.78rem;font-weight:600">${m.name}</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:3px">
          <div style="height:15px;background:var(--surface2);border-radius:4px;overflow:hidden">

function ganttHTML(t,maxDur,effStart,locked,mode='plan',projStart,startDateOverride){
  const pStart=effStart!=null?effStart:(t.startOffset||0),pDur=t.durPlan||1;
  const aStart=t.startActualOffset!=null?t.startActualOffset:pStart, aDur=t.durActual||0;
  const planColor=locked?'var(--accent2)':'var(--accent)';
  const showPlan=mode!=='actual', showAct=mode!=='plan';
  let cells='';
  for(let i=0;i<maxDur;i++){
    const inPlan=showPlan&&i>=pStart&&i<pStart+pDur;
    const inAct=showAct&&aDur>0&&i>=aStart&&i<aStart+aDur;
    if(mode==='both'){
      cells+=`<div style="flex:1;min-width:8px;display:flex;flex-direction:column;gap:1px">
        <div style="height:8px;border-radius:2px;background:${inPlan?planColor:'var(--surface3)'}"></div>
        <div style="height:6px;border-radius:2px;background:${inAct?'var(--green)':'transparent'}"></div></div>`;
    }else{
      const on=mode==='actual'?inAct:inPlan;
      const col=mode==='actual'?'var(--green)':planColor;
      cells+=`<div class="gantt-day" style="background:${on?col:'var(--surface3)'}"></div>`;
    }
  }
  // 日期標籤：起始日 → 結束日
  let label='';
  const sd = startDateOverride || (projStart?addDays(projStart,pStart):'');
  if(sd){
    const ed=addDays(sd,Math.max(1,pDur)-1);
    label=`<div style="font-size:.58rem;color:var(--muted);margin-top:2px;white-space:nowrap">${sd.slice(5)} → ${ed.slice(5)}</div>`;
  }
  return `<div class="gantt-track">${cells}</div>${label}`;
}
function memberHoursInProj(p,mid,mode='plan'){return projTasks(p).reduce((s,t)=>s+t.assignees.filter(a=>a.memberId===mid).reduce((ss,a)=>ss+aHours(a,mode),0),0);}
function memberCostInProj(p,mid,mode='plan'){const m=mById(mid);if(!m)return 0;return memberHoursInProj(p,mid,mode)*m.rate;}

let taskSel=new Set(); // 批次選取的任務 id
let taskEditMode=false; // 調整模式：顯示勾選框與上下移動
function toggleEditMode(pid){ taskEditMode=!taskEditMode; if(!taskEditMode)taskSel.clear(); renderProject(pid); }
function toggleCol(pid,key){ db.colPrefs=db.colPrefs||{}; db.colPrefs[key]=!db.colPrefs[key]; save(); renderProject(pid); }
function toggleTaskSel(pid,tid){ if(taskSel.has(tid))taskSel.delete(tid); else taskSel.add(tid); renderProject(pid); }
function toggleSelectAll(pid){
  const p=pById(pid); const all=projTasks(p).map(t=>t.id);
  if(all.length&&all.every(id=>taskSel.has(id)))all.forEach(id=>taskSel.delete(id));
  else all.forEach(id=>taskSel.add(id));
  renderProject(pid);
}
function batchDeleteTasks(pid){
  if(!taskSel.size)return;
  if(!confirm('刪除選取的 '+taskSel.size+' 個任務？無法復原。'))return;
  const p=pById(pid);
  p.workPackages.forEach(wp=>{ wp.tasks=wp.tasks.filter(t=>!taskSel.has(t.id)); });
  projTasks(p).forEach(t=>{ if(t.deps)t.deps=t.deps.filter(d=>!taskSel.has(d)); });
  taskSel.clear(); save(); renderProject(pid);
}
function moveTask(pid,wid,tid,dir){
  const {w,t}=findTask(pid,wid,tid);
  if(isLocked(t)){toast('此任務有前置相依，時間鎖定、不可手動移動');return;}
  const i=w.tasks.findIndex(x=>x.id===tid);
  const j=i+dir;
  if(j<0||j>=w.tasks.length)return;
  if(isLocked(w.tasks[j])){toast('相鄰任務被相依鎖定，無法交換');return;}
  [w.tasks[i],w.tasks[j]]=[w.tasks[j],w.tasks[i]];
  save(); renderProject(pid);
}

function findTask(pid,wid,tid){const p=pById(pid);const w=p.workPackages.find(x=>x.id===wid);return{p,w,t:w.tasks.find(x=>x.id===tid)};}

function applyTemplate(pid,wid,stage){
  const {w}=findTask(pid,wid,null);

  if(!items.length){toast('此階段範本是空的，請先到人員頁設定');return;}
  let off=nextOffset(w);
  items.forEach(line=>{
    const {name,hours,days}=parseTplItem(line);
    const dur=days>0?days:3; // 範本有設工期就用，否則預設 3 天
    const assignees=hours>0?[{memberId:'',hours:hours,hoursActual:null}]:[];
    w.tasks.push({id:uid('t'),name,assignees,fixedCost:0,fixedCostName:'',fixedCostActual:null,
      durPlan:dur,durActual:0,startActualOffset:null,startOffset:off,startDate:'',pct:0,status:'todo',deps:[]});

      ${db.projects.map(x=>{
        const isCur=x.id===pid;
        const tasks=projTasks(x);
        return `<div style="margin-top:4px">
          <label style="display:flex;align-items:center;gap:8px;font-size:.78rem;font-weight:700;cursor:pointer">
            <input type="checkbox" class="i-aff-cb" value="${x.id}" ${(iss.affected||[]).includes(x.id)?'checked':''}>

          ${tasks.length?`<div style="padding-left:20px;display:flex;flex-direction:column;gap:3px;margin-top:2px">
            ${tasks.map(t=>`<label style="display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--muted);cursor:pointer">

        </div>`;
      }).join('')}

    <div class="modal-actions">
      <button class="btn sec" onclick="closeModal()">取消</button>
      <button class="btn" onclick="saveIssue('${pid}','${iid||''}')">儲存</button>
    </div></div>`;
  M.classList.add('open');
}
function saveIssue(pid,iid){
  const p=pById(pid);if(!p.issues)p.issues=[];
  const data={text:document.getElementById('i-text').value.trim()||'(未填寫)',
    ownerId:document.getElementById('i-owner').value,
    light:document.getElementById('i-light').value,
    status:document.getElementById('i-status').value,
    affected:[...document.querySelectorAll('#i-affBox .i-aff-cb:checked')].map(c=>c.value)};
  if(iid)Object.assign(p.issues.find(i=>i.id===iid),data);
  else p.issues.push({id:uid('i'),...data});
  save();closeModal();renderProject(pid);
}
function delIssue(pid,iid){
  const p=pById(pid);p.issues=p.issues.filter(i=>i.id!==iid);save();renderProject(pid);
}
